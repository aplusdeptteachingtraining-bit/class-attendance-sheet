<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點名表產生器</title>

<style>
:root{--ink:#1a1a2e;--paper:#f8f6f1;--accent:#2d6a9f;--al:#e8f0f8;--am:#5a9fd4;--grid:#c8d4e0;--muted:#6b7c8d;--ok:#2a7a4b;--warn:#b05a00;--hb:#f7ede8;--hd:#d4836a;--sb:#edf3f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:700;letter-spacing:2px}
header p{font-size:11px;color:#aac4df;margin-top:2px}
.app{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 68px)} @media(max-width:768px){.app{grid-template-columns:1fr} aside{border-right:none;border-bottom:1px solid #dde5ed;max-height:none}}
aside{background:#fff;border-right:1px solid #dde5ed;padding:16px 14px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.pt{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid #eee}
.fg{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;font-weight:600;color:var(--ink)}
input[type=text],select,textarea{border:1.5px solid #d0dbe6;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--ink);background:#fafcff;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:90px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.uz{border:2px dashed #c0d0e0;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;background:#fafcff}
.uz:hover{border-color:var(--accent);background:var(--al)} .uz.ok{border-color:var(--ok);background:#eaf7ef}
.uz p{font-size:11px;color:var(--muted);line-height:1.5;margin-top:5px}
.ct{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink);padding:6px 8px;border-radius:5px;border:1.5px solid #d0dbe6;background:#fafcff;cursor:pointer;user-select:none;transition:all .15s}
.ct:hover{border-color:var(--accent);background:var(--al)}
.ct input{accent-color:var(--accent);width:14px;height:14px}
.cf{font-size:11px;color:var(--muted);background:#f0f4f8;padding:5px 8px;border-radius:4px}
#colHint{margin-top:5px;background:var(--al);border-radius:5px;padding:6px 8px;font-size:10px;color:var(--accent);line-height:1.6}
.btn{border:none;border-radius:7px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;width:100%}
.bp{background:var(--accent);color:#fff} .bp:hover{background:#1f5280}
.bpdf{background:var(--ink);color:#fff} .bpdf:hover{background:#0d0d1c}
.bs{background:#e8eff7;color:var(--accent)} .bs:hover{background:#d0e2f3}
.btn:disabled{opacity:.4;cursor:not-allowed}
.sts{background:#e8f0f8;border-radius:6px;padding:6px 10px;font-size:11px;color:var(--accent)}
.sts.ld{background:#fff8e6;color:var(--warn)} .sts.er{background:#ffeaea;color:#c0392b} .sts.ok{background:#eaf7ef;color:var(--ok)}
.leg{display:flex;flex-wrap:wrap;gap:6px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.ld2{width:11px;height:11px;border-radius:3px}
main{padding:22px;overflow-x:auto}
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#b0bec8;gap:10px}
.ph p{font-size:13px}
.sw{background:#fff;border:1px solid #dde5ed;border-radius:10px;padding:20px;box-shadow:0 2px 12px rgba(45,106,159,.07)}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px}
.sn{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;margin-bottom:3px}
.stl{font-size:17px;font-weight:900;color:var(--ink);letter-spacing:3px}
.sm{font-size:11px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}
.sbi{background:var(--al);border:1px solid #c8ddf0;border-radius:8px;padding:7px 11px;text-align:right;min-width:70px}
.sbi .num{font-size:20px;font-weight:900;color:var(--accent);line-height:1}
.sbi .lbl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:auto}
th,td{border:1px solid var(--grid);text-align:center;padding:0}
thead tr.hm th{background:var(--ink);color:#fff;font-size:10px;font-weight:700;padding:5px 3px}
thead tr.hw th{background:#e8eff7;color:var(--muted);font-size:9px;font-weight:600;padding:3px 2px}
.cn{width:26px} .cz{min-width:62px;width:62px;text-align:left!important;padding:0 5px!important;font-weight:600;white-space:nowrap;overflow:hidden}
.ce{min-width:55px;text-align:left!important;padding:0 5px!important;color:var(--muted)}
.cs{min-width:40px;font-size:10px;color:var(--muted)} .cc{min-width:32px;font-size:10px;color:var(--muted)}
.ch{min-width:48px;font-size:10px;color:#333;font-weight:600} .dc{min-width:28px;max-width:34px}
tbody tr{height:27px} .cz,.ce,.cs,.cc,.ch{white-space:nowrap;overflow:hidden;text-overflow:ellipsis} tbody tr:nth-child(even){background:#fafcff} tbody tr:hover{background:#f0f5fb}
td.cw{background:#fff} td.csat{background:var(--sb)} td.chol{background:var(--hb)}
td.att{cursor:pointer;user-select:none;transition:filter .1s;font-size:12px;line-height:27px}
td.att:hover{filter:brightness(.9)}
td.att.present::after{content:'○';color:var(--ok);font-weight:700}
td.att.absent::after{content:'✕';color:#c0392b;font-weight:900}
td.att.leave::after{content:'△';color:var(--warn);font-weight:700}
td.att.late::after{content:'◎';color:#8e44ad;font-weight:700}
.hl{font-size:8px;color:var(--hd);display:block;line-height:1.2;font-weight:600}
.dn{font-size:11px;font-weight:700;display:block}
tfoot td{background:#f0f4f8;font-weight:700;font-size:10px;color:var(--muted);padding:3px 2px}
.tn{color:var(--accent);font-size:11px}
.fn{margin-top:9px;padding:5px 10px;background:#f0f4f8;border-left:3px solid var(--am);border-radius:0 5px 5px 0;font-size:11px;color:var(--ink);font-weight:600}
@media print{
  @page{size:A4 landscape;margin:6mm 7mm}
  header,aside,.ar,#placeholder{display:none!important}
  body{background:#fff;margin:0}
  .app{display:block}
  main{padding:0;margin:0}
  .sw{border:none;box-shadow:none;padding:0}
  thead tr.hm th,td.chol,td.csat,tfoot td,tbody tr:nth-child(even){-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table{font-size:8.5px;width:100%;table-layout:fixed}
  .sh{margin-bottom:4px} .sbi{display:none!important}
  .stl{font-size:13px;letter-spacing:2px} .sn{font-size:9px} .sm{font-size:9px;gap:6px}
  thead tr.hm th{padding:3px 1px;font-size:8px}
  thead tr.hw th{padding:2px 1px;font-size:7px}
  tbody tr{height:22px}
  td.att{font-size:11px;line-height:22px}
  .cn{width:22px!important}
  .cz{width:58px!important;font-size:8.5px;white-space:nowrap}
  .ce{width:50px!important;font-size:8px;white-space:nowrap}
  .cs{width:36px!important;font-size:8px} .cc{width:28px!important;font-size:8px}
  .ch{width:44px!important;font-size:8px} .dc{font-size:8px}
  .dn{font-size:8px} .hl{font-size:6px}
  tfoot td{font-size:8px;padding:2px 1px;height:18px}
  .tn{font-size:8px}
  .fn{font-size:9px;padding:4px 8px;margin-top:4px}
}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

        </div>
        <div style="display:flex;gap:10px">
          <button onclick="document.getElementById('pdfModal').style.display='none'" style="flex:1;padding:10px;border:1.5px solid #dde5ed;border-radius:7px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit">取消</button>
          <button onclick="document.getElementById('pdfModal').style.display='none';printPDF()" style="flex:2;padding:10px;border:none;border-radius:7px;background:#1a1a2e;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">確定，開啟列印</button>
        </div>
      </div>
    </div>

    <button class="btn bs" id="clearBtn" onclick="clearAtt()">清除點名記錄</button>
  </div>
</aside>
<main id="mainArea">
  <div class="ph" id="placeholder">
    <svg width="68" height="68" fill="none" stroke="#b0c0d0" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <p>填寫左側設定，點「產生點名表」</p>
  </div>
</main>
</div>
<script>
const WEEKS=['日','一','二','三','四','五','六'];
const CYCLE=['present','absent','leave','late',null];
let calData=null,students=[],workDays=[],att={};

function getActiveCols(){
  const c=[];
  if(document.getElementById('colEn')?.checked) c.push('en');
  if(document.getElementById('colSch')?.checked) c.push('sch');
  if(document.getElementById('colCls')?.checked) c.push('cls');
  if(document.getElementById('colHr')?.checked) c.push('hr');
  return c;
}
function updateColHint(){
  const active=getActiveCols();
  const lb={en:'英文姓名',sch:'國小',cls:'班級',hr:'班導師'};
  const order=['中文姓名',...active.map(k=>lb[k])];
  const el=document.getElementById('colHint');
  if(el) el.textContent='📋 名單欄位：'+order.map((l,i)=>`第${i+1}欄 ${l}`).join('　');

}
document.addEventListener('DOMContentLoaded',()=>{
  ['colEn','colSch','colCls','colHr'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('change',()=>{
      updateColHint();
      if(document.getElementById('sheetWrapper')&&students.length){
        const m=parseManual();
        if(m.length) students=m.map((s,i)=>Object.assign({},s,{num:String(i+1)}));
        renderTable();
      }
    });
  });
  updateColHint();
});

function parseManual(){
  const raw=document.getElementById('manualStudents').value.trim();
  if(!raw) return [];
  const active=getActiveCols();
  return raw.split('\n').map((line,i)=>{
    let parts=[];
    if(line.includes('\t')){
      line.split('\t').forEach(cell=>{
        if(cell.includes(',')||cell.includes('，')){
          cell.split(/[,，]/).forEach(p=>parts.push(p.trim()));
        } else parts.push(cell.trim());
      });
    } else parts=line.split(/[,，]/).map(p=>p.trim());
    const obj={num:String(i+1),zh:parts[0]||'',en:'',sch:'',cls:'',hr:''};
    active.forEach((key,idx)=>{ obj[key]=parts[idx+1]||''; });
    return obj;
  }).filter(s=>s.zh&&/[\u4e00-\u9fff]/.test(s.zh));
}
document.getElementById('manualStudents').addEventListener('input',()=>{
  const p=parseManual();
  document.getElementById('parsePreview').textContent=p.length?`✓ 偵測到 ${p.length} 位學生`:'';
});

async function fetchCalendar(y){
  try{
    const r=await fetch(`https://raw.githubusercontent.com/ruyut/TaiwanCalendar/master/data/${y}.json`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error();
    const arr=await r.json(); const map={};
    arr.forEach(d=>{ map[d.date]={isHoliday:d.isHoliday,week:d.week,caption:d.description||''}; });
    return {map,source:'ruyut/TaiwanCalendar (GitHub)'};
  } catch{}
  return {map:buildLocal(y),source:'本機計算'};
}
function buildLocal(y){
  const h={2025:['20250101','20250127','20250128','20250129','20250130','20250131','20250201','20250202','20250228','20250403','20250404','20250501','20250929','20251010'],2026:['20260101','20260215','20260216','20260217','20260218','20260219','20260220','20260221','20260228','20260403','20260501','20261010']};
  const hs=new Set(h[y]||[]),map={},d=new Date(y,0,1);
  while(d.getFullYear()===y){
    const ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const wd=d.getDay();
    map[ds]={isHoliday:wd===0||hs.has(ds),week:WEEKS[wd],caption:hs.has(ds)?'國定假日':''};
    d.setDate(d.getDate()+1);
  }
  return map;
}

async function generate(){
  const st=document.getElementById('calStatus');
  st.className='sts ld'; st.textContent='⏳ 正在載入台灣政府行事曆...';
  const rocYear=parseInt(document.getElementById('rocYear').value);
  const adYear=rocYear+1911, month=parseInt(document.getElementById('month').value);
  const res=await fetchCalendar(adYear);
  calData=res.map; st.className='sts ok'; st.textContent=`✓ 行事曆載入成功（${res.source}）`;
  const manual=parseManual();
  if(!manual.length&&!students.length){ alert('請先輸入學生名單！'); return; }
  if(manual.length) students=manual;
  students=students.map((s,i)=>Object.assign({},s,{num:String(i+1)}));
  const dayFilter=document.getElementById('dayFilter').value;
  const dim=new Date(adYear,month,0).getDate(); workDays=[];
  for(let d=1;d<=dim;d++){
    const ds=`${adYear}${String(month).padStart(2,'0')}${String(d).padStart(2,'0')}`;
    const wd=new Date(adYear,month-1,d).getDay();
    const info=calData[ds]||{isHoliday:wd===0||wd===6,week:WEEKS[wd],caption:''};
    info.dateStr=ds; info.day=d; info.wd=wd;
    if(dayFilter==='weekdays'){ if(!info.isHoliday&&wd!==0) workDays.push(info); }
    else if(dayFilter==='13'){ if(!info.isHoliday&&(wd===1||wd===3)) workDays.push(info); }
    else if(dayFilter==='24'){ if(!info.isHoliday&&(wd===2||wd===4)) workDays.push(info); }
    else workDays.push(info);
  }
  att={}; renderTable();

}

function renderTable(){
  const rocYear=document.getElementById('rocYear').value;
  const month=document.getElementById('month').value;
  const schoolName=document.getElementById('schoolName').value;
  const sheetLabel=document.getElementById('sheetLabel').value||'班級點名表';
  const className=document.getElementById('className').value;
  const teacher=document.getElementById('teacherName').value;
  const active=getActiveCols();
  const LOGO=document.getElementById('logoSrc').value;

  document.getElementById('placeholder')?.remove();
  document.getElementById('sheetWrapper')?.remove();
  const wrap=document.createElement('div');
  wrap.className='sw'; wrap.id='sheetWrapper';

  const titleLetters=sheetLabel.split('').join(' ');
  wrap.innerHTML=`
    <div class="sh">
      <div>
        <div class="sn">${schoolName}</div>
        <div class="stl">${titleLetters}</div>
        <div class="sm"><span>📅 民國 ${rocYear} 年 ${month} 月份</span><span>👨‍🏫 ${className}</span><span>✏️ ${teacher}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="sbi"><div class="num">${workDays.length}</div><div class="lbl">上課天數</div></div>
        <img src="${LOGO}" style="width:46px;height:46px;object-fit:contain" alt="A+">
      </div>
    </div>`;

  const COLS=[
    {label:'序',cls:'cn',key:'num',show:true},
    {label:'姓名',cls:'cz',key:'zh',show:true},
    {label:'英文',cls:'ce',key:'en',show:active.includes('en')},
    {label:'國小',cls:'cs',key:'sch',show:active.includes('sch')},
    {label:'班級',cls:'cc',key:'cls',show:active.includes('cls')},
    {label:'班導師',cls:'ch',key:'hr',show:active.includes('hr')},
  ];

  const table=document.createElement('table');
  const thead=document.createElement('thead');
  const tr1=document.createElement('tr'); tr1.className='hm';
  COLS.forEach(col=>{
    if(!col.show) return;
    const th=document.createElement('th'); th.rowSpan=2; th.textContent=col.label; th.className=col.cls;
    tr1.appendChild(th);
  });
  workDays.forEach(info=>{
    const th=document.createElement('th'); th.className='dc';
    const isSat=info.wd===6,isHol=info.isHoliday;
    th.innerHTML=(isHol&&info.caption)?`<span class="hl">${info.caption.substring(0,2)}</span><span class="dn">${info.day}</span>`:`<span class="dn">${info.day}</span>`;
    if(isHol) th.style.background='#c57a60'; else if(isSat) th.style.background='#7aa8cc';
    tr1.appendChild(th);
  });
  const thA=document.createElement('th'); thA.rowSpan=2; thA.textContent='請假'; tr1.appendChild(thA);
  thead.appendChild(tr1);
  const tr2=document.createElement('tr'); tr2.className='hw';
  workDays.forEach(info=>{
    const th=document.createElement('th'); th.textContent=WEEKS[info.wd];
    if(info.wd===6) th.style.color='#2d6a9f'; else if(info.isHoliday) th.style.color='#c0392b';
    tr2.appendChild(th);
  });
  thead.appendChild(tr2); table.appendChild(thead);

  const tbody=document.createElement('tbody');
  students.forEach((stu,si)=>{
    if(!att[si]) att[si]={};
    const tr=document.createElement('tr');
    COLS.forEach(col=>{
      if(!col.show) return;
      const td=document.createElement('td'); td.textContent=stu[col.key]||''; td.className=col.cls;
      tr.appendChild(td);
    });
    workDays.forEach(info=>{
      const td=document.createElement('td');
      td.className='att '+(info.isHoliday?'chol':info.wd===6?'csat':'cw');
      const state=att[si][info.dateStr]; if(state) td.classList.add(state);
      td.addEventListener('click',()=>{
        const cur=att[si][info.dateStr]||null;
        const next=CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
        if(next===null) delete att[si][info.dateStr]; else att[si][info.dateStr]=next;
        td.className='att '+(info.isHoliday?'chol':info.wd===6?'csat':'cw');
        if(next) td.classList.add(next);
        updateCounts();
      });
      tr.appendChild(td);
    });
    const tdL=document.createElement('td'); tdL.id=`lv-${si}`;
    tdL.style.cssText='font-weight:700;color:var(--warn)';
    tr.appendChild(tdL); tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  const tfoot=document.createElement('tfoot');
  const trF=document.createElement('tr');
  const vis=COLS.filter(c=>c.show).length;
  const tdLbl=document.createElement('td'); tdLbl.colSpan=vis; tdLbl.textContent='請假人數'; trF.appendChild(tdLbl);
  workDays.forEach(info=>{ const td=document.createElement('td'); td.id=`ca-${info.dateStr}`; td.className='tn'; trF.appendChild(td); });
  trF.appendChild(document.createElement('td'));
  tfoot.appendChild(trF); table.appendChild(tfoot);
  wrap.appendChild(table);

  const noteText=document.getElementById('footerNote').value||'請假打 X　有到打 V　學期間有訂購晚餐請圈起來備註升級餐或一般餐';
  const nd=document.createElement('div'); nd.className='fn'; nd.textContent='【說明】'+noteText;
  wrap.appendChild(nd);
  document.getElementById('mainArea').appendChild(wrap);
  updateCounts();
}

function updateCounts(){
  students.forEach((_,si)=>{
    const cnt=Object.values(att[si]||{}).filter(v=>v==='absent'||v==='leave').length;
    const el=document.getElementById(`lv-${si}`); if(el) el.textContent=cnt||'';
  });
  workDays.forEach(info=>{
    const cnt=students.filter((_,si)=>{ const s=att[si]?.[info.dateStr]; return s==='absent'||s==='leave'; }).length;
    const el=document.getElementById(`ca-${info.dateStr}`); if(el) el.textContent=cnt||'';
  });
}
function printPDF(){
  const sw = document.getElementById('sheetWrapper');
  if(!sw){ alert('請先按「產生點名表」！'); return; }

  const btn = document.getElementById('pdfBtn');
  const origHTML = btn.innerHTML;
  btn.textContent = '⏳ 產生中...';
  btn.disabled = true;

  const sheetLabel = document.getElementById('sheetLabel')?.value || '點名表';
  const month = document.getElementById('month').value;
  const rocYear = document.getElementById('rocYear').value;
  const fileName = sheetLabel + '_' + rocYear + '年' + month + '月.pdf';

  const origStyle = sw.getAttribute('style') || '';
  sw.style.cssText = 'width:1050px;min-width:1050px;box-shadow:none;border:none;padding:20px;background:#fff';

  setTimeout(()=>{
    html2canvas(sw, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false
    }).then(canvas => {
      sw.setAttribute('style', origStyle);

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
      const pageW=297, pageH=210, margin=6;
      const usableW=pageW-margin*2, usableH=pageH-margin*2;
      const ratio = canvas.width/canvas.height;
      let imgW=usableW, imgH=imgW/ratio;
      if(imgH>usableH){ imgH=usableH; imgW=imgH*ratio; }
      doc.addImage(canvas.toDataURL('image/jpeg',0.97),'JPEG',margin,margin,imgW,imgH);

      // Detect mobile/tablet
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      if(isMobile){
        // Mobile: open PDF in new tab (user can long-press to save)
        const pdfBlob = doc.output('blob');
        const url = URL.createObjectURL(pdfBlob);
        const newTab = window.open(url, '_blank');
        if(!newTab){
          // Fallback: use data URI download link
          const link = document.createElement('a');
          link.href = URL.createObjectURL(pdfBlob);
          link.download = fileName;
          link.click();
        }
        // Show instruction for mobile
        setTimeout(()=>{
          alert('📱 手機/平板儲存方式：\n\n已在新分頁開啟PDF\n請長按畫面 → 選「下載」或「儲存到檔案」\n\niOS：點右上角分享按鈕 → 「儲存到檔案」\nAndroid：長按 → 「下載連結」');
        }, 500);
      } else {
        // Desktop: direct download
        doc.save(fileName);
      }

      btn.innerHTML = origHTML;
      btn.disabled = false;
    }).catch(err => {
      sw.setAttribute('style', origStyle);
      btn.innerHTML = origHTML;
      btn.disabled = false;
      alert('PDF產生失敗，請再試一次');
    });
  }, 100);
}

function clearAtt(){ if(!confirm('確定清除所有點名記錄？')) return; att={}; renderTable(); }
</script>
</body>
</html>
